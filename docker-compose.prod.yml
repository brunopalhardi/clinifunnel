version: "3.8"

services:
  web:
    build: .
    container_name: clinifunnel-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    networks:
      - clinifunnel-network

  workers:
    build: .
    container_name: clinifunnel-workers
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    networks:
      - clinifunnel-network
    command: ["npx", "tsx", "src/workers/index.ts"]

  postgres:
    image: postgres:16-alpine
    container_name: clinifunnel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinifunnel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinifunnel}
      POSTGRES_DB: clinifunnel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinifunnel-network

  redis:
    image: redis:7-alpine
    container_name: clinifunnel-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - clinifunnel-network

volumes:
  postgres_data:
  redis_data:

networks:
  clinifunnel-network:
    driver: bridge
