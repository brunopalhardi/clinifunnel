version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinifunnel-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: odontofunil
      POSTGRES_PASSWORD: odontofunil
      POSTGRES_DB: odontofunil
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: clinifunnel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
